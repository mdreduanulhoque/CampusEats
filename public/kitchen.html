<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Staff Portal - CampusEats</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .kitchen-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .filters-bar {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.5rem;
    }
    .order-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .order-card:hover {
      box-shadow: var(--shadow-md);
    }
    .order-card.status-pending { border-left: 6px solid var(--warning); }
    .order-card.status-accepted { border-left: 6px solid var(--info); }
    .order-card.status-preparing { border-left: 6px solid var(--primary); }
    .order-card.status-ready { border-left: 6px solid var(--success); }
    .order-card.status-picked_up { border-left: 6px solid #64748b; opacity: 0.85; }
    .order-card.status-rejected { border-left: 6px solid var(--danger); opacity: 0.65; }

    .order-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.8rem;
    }
    .pickup-highlight {
      background: rgba(212, 109, 37, 0.1);
      color: var(--primary);
      padding: 0.45rem 0.85rem;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.9rem;
      border: 1px solid rgba(212, 109, 37, 0.2);
    }
    .item-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.92rem;
      padding: 0.35rem 0;
      border-bottom: 1px dashed var(--border-color);
      color: var(--text-main);
    }
    .order-footer {
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid var(--border-color);
    }
    .status-badge {
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-pending { background: var(--warning-bg); color: var(--warning); border: 1px solid rgba(253, 192, 134, 0.5); }
    .badge-accepted { background: var(--info-bg); color: var(--info); border: 1px solid rgba(2, 132, 199, 0.3); }
    .badge-preparing { background: rgba(212, 109, 37, 0.15); color: var(--primary); border: 1px solid rgba(212, 109, 37, 0.3); }
    .badge-ready { background: var(--success-bg); color: var(--success); border: 1px solid var(--border-color-sage); }
    .badge-picked_up { background: #f1f5f9; color: #64748b; border: 1px solid #cbd5e1; }
    .badge-rejected { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(220, 38, 38, 0.25); }

    .paid-tag { background: var(--success-bg); color: var(--success); border: 1px solid var(--border-color-sage); font-weight: 800; }
    .unpaid-tag { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(220, 38, 38, 0.25); font-weight: 800; }

    /* Auto-sync pulsing indicator */
    .sync-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
      margin-right: 4px;
      box-shadow: 0 0 0 0 rgba(212, 109, 37, 0.5);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 109, 37, 0.6); }
      70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(212, 109, 37, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 109, 37, 0); }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/kitchen" class="brand">🍳 </a>
    <ul class="nav-links">
      <li><span class="badge badge-kitchen">Staff</span></li>
      <li><span id="userName" style="font-weight: 700; color: var(--text-main);"></span></li>
      <li><button onclick="Auth.logout()" class="btn btn-outline" style="padding: 0.4rem 0.9rem;">Logout</button></li>
    </ul>
  </nav>

  <div class="container">
    <!-- Header Banner -->
    <div style="background: var(--bg-card); border-radius: var(--radius-lg); padding: 1.6rem 2rem; border: 1px solid var(--border-color); margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; box-shadow: var(--shadow-sm);">
      <div>
        <h1 style="font-size: 1.8rem; margin-bottom: 0.3rem; font-weight: 800; color: var(--text-main);">Kitchen Live Order Queue 👨‍🍳</h1>
        <p style="color: var(--text-muted); font-size: 0.92rem;">Incoming orders with newest at top. Auto-syncing every 3s.</p>
      </div>

      <div style="display: flex; align-items: center; gap: 1rem;">
        <div style="font-size: 0.85rem; color: var(--text-main); background: var(--bg-card-subtle); padding: 0.55rem 0.95rem; border-radius: var(--radius-sm); border: 1px solid var(--border-color); font-weight: 600;">
          <span class="sync-indicator"></span> Auto-syncing: <strong id="pollCountdown" style="color: var(--primary);">3s</strong>
        </div>
        <button onclick="fetchKitchenOrders()" class="btn btn-outline" style="padding: 0.5rem 0.9rem; font-size: 0.85rem;">⚡ Refresh Now</button>
      </div>
    </div>

    <!-- Filters Bar -->
    <div class="kitchen-header">
      <div class="filters-bar">
        <div>
          <label style="font-size: 0.82rem; color: var(--text-main); font-weight: 700; display: block; margin-bottom: 0.2rem;">Filter Status</label>
          <select id="statusFilter" class="form-control" onchange="fetchKitchenOrders()" style="padding: 0.45rem 0.85rem; font-size: 0.9rem; width: auto; min-width: 180px;">
            <option value="all">All Active Orders</option>
            <option value="pending" selected>Pending Confirmation</option>
            <option value="accepted">Accepted</option>
            <option value="preparing">Preparing</option>
            <option value="ready">Ready for Pickup</option>
            <option value="picked_up">Completed / Picked Up</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>

        <div>
          <label style="font-size: 0.82rem; color: var(--text-main); font-weight: 700; display: block; margin-bottom: 0.2rem;">Filter Date</label>
          <input type="date" id="dateFilter" class="form-control" onchange="fetchKitchenOrders()" style="padding: 0.45rem 0.85rem; font-size: 0.9rem; width: auto;">
        </div>
      </div>

      <div>
        <span id="orderCountBadge" style="font-size: 0.9rem; color: var(--text-muted); font-weight: 600;">0 Orders Found</span>
      </div>
    </div>

    <!-- Alert Box -->
    <div id="kitchenAlert" class="alert alert-success"></div>

    <!-- Orders Queue Grid -->
    <div class="orders-grid" id="ordersGrid">
      <div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 4rem;">Loading order queue...</div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 CampusEats Canteen Application. All rights reserved.</p>
  </footer>

  <script src="/js/auth.js"></script>
  <script>
    const kitchenUser = Auth.checkAccess('kitchen');
    if (kitchenUser) {
      document.getElementById('userName').textContent = kitchenUser.name;
    }

    let pollInterval = null;
    let countdownTimer = null;
    let secondsLeft = 3;

    function startAutoPolling() {
      if (pollInterval) clearInterval(pollInterval);
      if (countdownTimer) clearInterval(countdownTimer);

      secondsLeft = 3;
      document.getElementById('pollCountdown').textContent = `${secondsLeft}s`;

      countdownTimer = setInterval(() => {
        secondsLeft--;
        if (secondsLeft <= 0) secondsLeft = 3;
        document.getElementById('pollCountdown').textContent = `${secondsLeft}s`;
      }, 1000);

      pollInterval = setInterval(() => {
        fetchKitchenOrders(true); // silent background fetch
      }, 3000);
    }

    function showAlert(msg, isSuccess = true) {
      const alert = document.getElementById('kitchenAlert');
      alert.className = isSuccess ? 'alert alert-success' : 'alert alert-danger';
      alert.textContent = msg;
      alert.style.display = 'block';
      setTimeout(() => alert.style.display = 'none', 4000);
    }

    async function fetchKitchenOrders(isSilent = false) {
      const status = document.getElementById('statusFilter').value;
      const date = document.getElementById('dateFilter').value;

      let url = `/api/kitchen/orders?status=${status}`;
      if (date) url += `&date=${date}`;

      try {
        const res = await fetch(url, {
          headers: { 'Authorization': `Bearer ${Auth.getToken()}` }
        });
        const data = await res.json();

        if (data.status === 'success') {
          renderOrdersGrid(data.orders);
          document.getElementById('orderCountBadge').textContent = `${data.orders.length} Order(s) Shown`;
        }
      } catch (err) {
        if (!isSilent) console.error('Failed to fetch kitchen orders:', err);
      }
    }

    function renderOrdersGrid(orders) {
      const grid = document.getElementById('ordersGrid');
      if (orders.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 4rem;">No incoming orders matching your filter.</div>`;
        return;
      }

      grid.innerHTML = orders.map(order => {
        const pickupDate = new Date(order.pickup_time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const fullPickup = new Date(order.pickup_time).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' });

        return `
          <div class="order-card status-${order.status}">
            <div class="order-meta">
              <div>
                <span style="font-size: 1.2rem; font-weight: 800; color: var(--primary);">#${order.order_id}</span>
                <div style="font-weight: 700; font-size: 0.95rem; margin-top: 0.2rem; color: var(--text-main);">👤 ${order.customer_name}</div>
              </div>
              <div style="text-align: right;">
                <span class="status-badge badge-${order.status}">${order.status.replace('_', ' ')}</span>
                <div style="margin-top: 0.35rem;">
                  <span class="badge ${order.payment_status === 'paid' ? 'paid-tag' : 'unpaid-tag'}">${order.payment_status.toUpperCase()}</span>
                </div>
              </div>
            </div>

            <div class="pickup-highlight">
              ⏰ Pickup Time: ${pickupDate} (${fullPickup})
            </div>

            <!-- Items List -->
            <div style="margin-bottom: 1rem; max-height: 150px; overflow-y: auto;">
              ${order.items.map(item => `
                <div class="item-row">
                  <span><strong>${item.quantity}x</strong> ${item.item_name}</span>
                  <span style="color: var(--text-muted); font-weight: 600;">$${parseFloat(item.subtotal).toFixed(2)}</span>
                </div>
              `).join('')}
            </div>

            <!-- Order Summary Footer -->
            <div class="order-footer">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem;">
                <span style="color: var(--text-muted); font-size: 0.9rem; font-weight: 600;">Total Cash Due:</span>
                <span style="font-size: 1.35rem; font-weight: 800; color: var(--primary);">$${parseFloat(order.total_amount).toFixed(2)}</span>
              </div>

              <!-- Status Action Buttons -->
              <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                ${renderStatusButtons(order)}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderStatusButtons(order) {
      const { order_id, status, payment_status } = order;

      if (status === 'pending') {
        return `
          <button onclick="updateOrderStatus(${order_id}, 'accepted')" class="btn btn-primary" style="flex: 1; padding: 0.4rem 0.6rem; font-size: 0.85rem;">Accept Order</button>
          <button onclick="updateOrderStatus(${order_id}, 'rejected')" class="btn btn-danger" style="padding: 0.4rem 0.6rem; font-size: 0.85rem;">Reject</button>
        `;
      }

      if (status === 'accepted') {
        return `
          <button onclick="updateOrderStatus(${order_id}, 'preparing')" class="btn btn-primary" style="flex: 1; padding: 0.4rem 0.6rem; font-size: 0.85rem;">Start Preparing 🍳</button>
          <button onclick="updateOrderStatus(${order_id}, 'rejected')" class="btn btn-danger" style="padding: 0.4rem 0.6rem; font-size: 0.85rem;">Cancel</button>
        `;
      }

      if (status === 'preparing') {
        return `
          <button onclick="updateOrderStatus(${order_id}, 'ready')" class="btn btn-secondary" style="flex: 1; padding: 0.4rem 0.6rem; font-size: 0.85rem;">Mark Ready for Pickup 🔔</button>
        `;
      }

      if (status === 'ready') {
        return `
          <button onclick="updateOrderStatus(${order_id}, 'picked_up')" class="btn btn-secondary" style="flex: 1; padding: 0.4rem 0.6rem; font-size: 0.85rem;">💵 Mark Cash Received & Picked Up</button>
        `;
      }

      if (status === 'picked_up') {
        return `<span style="color: var(--success); font-weight: 700; font-size: 0.85rem; padding: 0.4rem 0;">✓ Order Picked Up & Cash Collected</span>`;
      }

      if (status === 'rejected') {
        return `<span style="color: var(--danger); font-weight: 700; font-size: 0.85rem; padding: 0.4rem 0;">❌ Order Rejected / Cancelled</span>`;
      }

      return '';
    }

    async function updateOrderStatus(orderId, newStatus) {
      try {
        const res = await fetch(`/api/kitchen/orders/${orderId}/status`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${Auth.getToken()}`
          },
          body: JSON.stringify({ new_status: newStatus })
        });
        const data = await res.json();

        if (data.status === 'success') {
          showAlert(data.message);
          fetchKitchenOrders();
        } else {
          showAlert(data.message, false);
        }
      } catch (err) {
        showAlert('Failed to update status.', false);
      }
    }

    // Initial load & start 3s auto-polling
    fetchKitchenOrders();
    startAutoPolling();
  </script>
</body>
</html>
