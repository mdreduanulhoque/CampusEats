<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - CampusEats</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="brand">🍔 CampusEats</a>
    <ul class="nav-links">
      <li><a href="/login" class="nav-link">Login</a></li>
      <li><a href="/register" class="btn btn-primary">Register</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Create an Account</h2>
        <p>Register to pre-order food and earn loyalty rewards</p>
      </div>

      <div id="alertMsg" class="alert alert-danger"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required minlength="6">
        </div>

        <div class="form-group">
          <label for="daily_limit">Daily Spending Limit ($)</label>
          <input type="number" id="daily_limit" class="form-control" placeholder="25.00" step="0.50" min="0" value="25.00">
          <small style="color: var(--text-muted); font-size: 0.8rem;">Optionally set a maximum total amount you can order per day.</small>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
      </form>

      <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
        Already have an account? <a href="/login" style="color: var(--primary); text-decoration: none; font-weight: 600;">Log in here</a>
      </p>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 CampusEats Canteen Application. All rights reserved.</p>
  </footer>

  <script src="/js/auth.js"></script>
  <script>
    Auth.redirectIfAuthenticated();

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertMsg = document.getElementById('alertMsg');
      alertMsg.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const daily_limit = document.getElementById('daily_limit').value;

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, daily_limit })
        });

        const data = await response.json();

        if (data.status === 'success') {
          Auth.setSession(data.token, data.user);
          window.location.href = '/';
        } else {
          alertMsg.textContent = data.message || 'Registration failed.';
          alertMsg.style.display = 'block';
        }
      } catch (err) {
        alertMsg.textContent = 'Server connection error. Please try again.';
        alertMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
